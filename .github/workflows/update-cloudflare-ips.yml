name: Update Cloudflare IP Ranges

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays at 06:00 UTC
    - cron: '0 6 * * 4'  # Thursdays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Fetch and update Cloudflare IP ranges
        id: update
        run: |
          python3 - <<'EOF'
          import urllib.request, re, json

          data = json.loads(urllib.request.urlopen('https://api.cloudflare.com/client/v4/ips').read())
          new_ips = data['result']['ipv4_cidrs'] + data['result']['ipv6_cidrs']

          path = 'oci/traefik/multitenancy/lb-source-ranges-configmap.yaml'
          with open(path) as f:
              content = f.read()

          items = ''.join(f'        - {ip}\n' for ip in new_ips)

          new_content = re.sub(
              r'(        # BEGIN CLOUDFLARE\n)(?:        - .+\n)+(        # END CLOUDFLARE\n)',
              r'\g<1>' + items + r'\g<2>',
              content,
          )

          with open(path, 'w') as f:
              f.write(new_content)
          EOF

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        run: |
          BRANCH="chore/update-cloudflare-ips-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add oci/traefik/multitenancy/lb-source-ranges-configmap.yaml
          git commit -m "chore(traefik): update Cloudflare IP ranges"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(traefik): update Cloudflare IP ranges" \
            --body "Automated update of Cloudflare IP ranges in the traefik load balancer source ranges ConfigMap." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
