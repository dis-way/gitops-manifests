name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  kustomize-diff:
    uses: dis-way/actions/.github/workflows/kustomize-diff.yml@87a3c5e6a95eb24448d8bf4884ea2fcd9b9c0ced # main
    with:
      build-paths: "oci/*,oci/*/apps,oci/*/multitenancy,oci/*/adminservices,oci/*/platform-aks"
    permissions:
      contents: read
      pull-requests: write
