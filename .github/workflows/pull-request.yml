name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  kustomize-diff:
    uses: dis-way/actions/.github/workflows/kustomize-diff.yml@ef62d7a78d1b7ff787129170e35932cd779ce3e3 # main
    with:
      build-paths: "oci/*,oci/*/apps,oci/*/multitenancy,oci/*/adminservices,oci/*/platform-aks"
    permissions:
      contents: read
      pull-requests: write
