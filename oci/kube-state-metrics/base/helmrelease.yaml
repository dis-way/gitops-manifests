apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: kube-state-metrics
spec:
  chart:
    spec:
      chart: kube-state-metrics
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: kube-state-metrics
      # renovate: datasource=helm registryUrl=https://prometheus-community.github.io/helm-charts packageName=kube-state-metrics
      version: 7.3.0
  interval: 1h
  timeout: 5m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  targetNamespace: kube-state-metrics
  releaseName: kube-state-metrics
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ServiceMonitor
              group: monitoring.coreos.com
            patch: |-
              - op: replace
                path: /apiVersion
                value: azmonitoring.coreos.com/v1
              - op: add
                path: /spec/labelLimit
                value: 63
              - op: add
                path: /spec/labelNameLengthLimit
                value: 511
              - op: add
                path: /spec/labelValueLengthLimit
                value: 1023
  values:
    image:
      registry: altinncr.azurecr.io/registry.k8s.io
    collectors: []
    customResourceStateOnly: true
    customResourceState:
      enabled: true
      config:
        spec:
          resources:
            - groupVersionKind:
                group: kustomize.toolkit.fluxcd.io
                version: v1
                kind: Kustomization
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux Kustomization resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, lastAppliedRevision]
                    source_name: [spec, sourceRef, name]
            - groupVersionKind:
                group: helm.toolkit.fluxcd.io
                version: v2
                kind: HelmRelease
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux HelmRelease resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, history, "0", chartVersion]
                    chart_name: [status, history, "0", chartName]
                    chart_app_version: [status, history, "0", appVersion]
                    chart_ref_name: [spec, chartRef, name]
                    chart_source_name: [spec, chart, spec, sourceRef, name]
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: GitRepository
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux GitRepository resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, artifact, revision]
                    url: [spec, url]
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: Bucket
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux Bucket resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, artifact, revision]
                    endpoint: [spec, endpoint]
                    bucket_name: [spec, bucketName]
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: HelmRepository
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux HelmRepository resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, artifact, revision]
                    url: [spec, url]
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: HelmChart
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux HelmChart resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, artifact, revision]
                    chart_name: [spec, chart]
                    chart_version: [spec, version]
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: OCIRepository
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux OCIRepository resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    revision: [status, artifact, revision]
                    url: [spec, url]
            - groupVersionKind:
                group: notification.toolkit.fluxcd.io
                version: v1beta3
                kind: Alert
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux Alert resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    suspended: [spec, suspend]
            - groupVersionKind:
                group: notification.toolkit.fluxcd.io
                version: v1beta3
                kind: Provider
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux Provider resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    suspended: [spec, suspend]
            - groupVersionKind:
                group: notification.toolkit.fluxcd.io
                version: v1
                kind: Receiver
              metricNamePrefix: gotk
              metrics:
                - name: resource_info
                  help: "The current state of a Flux Receiver resource."
                  each:
                    type: Info
                    info:
                      labelsFromPath:
                        name: [metadata, name]
                  labelsFromPath:
                    exported_namespace: [metadata, namespace]
                    ready: [status, conditions, "[type=Ready]", status]
                    suspended: [spec, suspend]
                    webhook_path: [status, webhookPath]
    rbac:
      extraRules:
        - apiGroups:
            - source.toolkit.fluxcd.io
            - kustomize.toolkit.fluxcd.io
            - helm.toolkit.fluxcd.io
            - notification.toolkit.fluxcd.io
          resources:
            - gitrepositories
            - buckets
            - helmrepositories
            - helmcharts
            - ocirepositories
            - kustomizations
            - helmreleases
            - alerts
            - providers
            - receivers
          verbs:
            - list
            - watch
    prometheus:
      monitor:
        enabled: true
    nodeSelector:
      kubernetes.azure.com/mode: system
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
