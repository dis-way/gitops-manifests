apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-crd-patch
  namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-crd-patch
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions/status"]
    verbs: ["get", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-crd-patch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-crd-patch
subjects:
  - kind: ServiceAccount
    name: traefik-crd-patch
    namespace: traefik
---
apiVersion: batch/v1
kind: Job
metadata:
  name: traefik-crd-patch
  namespace: traefik
spec:
  template:
    spec:
      serviceAccountName: traefik-crd-patch
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          image: altinncr.azurecr.io/docker.io/bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              kubectl get crd grpcroutes.gateway.networking.k8s.io 2>/dev/null || exit 0
              kubectl patch crd grpcroutes.gateway.networking.k8s.io \
                --type=json \
                --subresource=status \
                -p '[{"op":"replace","path":"/status/storedVersions","value":["v1"]}]'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
