apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: "https://acme-v02.api.letsencrypt.org/directory"
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cnameStrategy: Follow
          azureDNS:
            hostedZoneName: acme.altinn.cloud
            resourceGroupName: dis-tls-cert
            subscriptionID: a6e9ee7d-2b65-41e1-adfb-0c8c23515cf9
            environment: AzurePublicCloud
            managedIdentity:
              clientID: "${UAMI_CERT_MANAGER_CLIENT_ID}"
