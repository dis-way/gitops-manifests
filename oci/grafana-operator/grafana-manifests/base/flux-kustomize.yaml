apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-content
  namespace: flux-system
spec:
  interval: 5m0s
  retryInterval: 1m0s
  path: ./
  prune: true
  sourceRef:
    kind: OCIRepository
    name: grafana-content
    namespace: flux-system
  targetNamespace: grafana
  timeout: 5m0s
  wait: true
