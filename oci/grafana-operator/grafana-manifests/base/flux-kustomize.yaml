apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-content
  namespace: flux-system
spec:
  interval: 5m0s
  retryInterval: 1m0s
  # This Kustomization applies grafana.integreatly.org/v1beta1 CRs (folders, dashboards,
  # alert rules). Those CRDs are registered by the grafana-operator HelmRelease, which is
  # applied by a DIFFERENT (cluster-bootstrap) Kustomization. Until that operator
  # Kustomization is Ready, reconciles here fail with "no matches for kind ... in version
  # grafana.integreatly.org/v1beta1" and (with wait: true) report NotReady; they self-heal
  # via retryInterval. To order this cleanly, uncomment dependsOn and set it to the name of
  # the bootstrap Kustomization that applies oci/grafana-operator/base (confirm in the
  # cluster-bootstrap repo):
  # dependsOn:
  #   - name: <grafana-operator-kustomization-name>
  #     namespace: flux-system
  path: ./
  prune: true
  sourceRef:
    kind: OCIRepository
    name: grafana-content
    namespace: flux-system
  targetNamespace: grafana
  timeout: 5m0s
  wait: true
