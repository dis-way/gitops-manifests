apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost-system
spec:
  interval: 4h
  releaseName: opencost
  targetNamespace: opencost-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: opencost
      # renovate: datasource=helm registryUrl=https://opencost.github.io/opencost-helm-chart packageName=opencost
      version: "2.5.14"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: opencost-system
  values:
    opencost:
      labels:
        azure.workload.identity/use: "true"
      prometheus:
        external:
          enabled: true
          url: http://localhost:8080
        internal:
          enabled: false
      metrics:
        serviceMonitor:
          enabled: false
      extraContainers:
        - name: aad-auth-proxy
          image: mcr.microsoft.com/azuremonitor/auth-proxy/prod/aad-auth-proxy/images/aad-auth-proxy:0.1.0-main-04-10-2024-7067ac84
          env:
            - name: AUDIENCE
              value: "https://prometheus.monitor.azure.com/.default"
            - name: TARGET_HOST
              value: "${AZURE_PROMETHEUS_ENDPOINT}"
            - name: LISTENING_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: proxy
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: ${OPENCOST_CLIENT_ID}
    podLabels:
      azure.workload.identity/use: "true"
