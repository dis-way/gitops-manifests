apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost-system
spec:
  interval: 1h
  releaseName: opencost
  targetNamespace: opencost-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: opencost
      # renovate: datasource=helm registryUrl=https://opencost.github.io/opencost-helm-chart packageName=opencost
      version: "1.30.0"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: opencost-system
  values:
    opencost:
      prometheus:
        external:
          enabled: true
          url: http://localhost:8080
        internal:
          enabled: false
      metrics:
        serviceMonitor:
          enabled: true
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: ${OPENCOST_CLIENT_ID}
    extraContainers:
      - name: aad-auth-proxy
        image: mcr.microsoft.com/azuremonitor/auth-proxy/prod/aad-auth-proxy/images/aad-auth-proxy:0.1.0-main-04-10-2024-7067ac84
        args:
          - --upstream-url=${AZURE_PROMETHEUS_ENDPOINT}
          - --base-auth-url=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
          - --listen-address=0.0.0.0:8080
        ports:
          - containerPort: 8080
            name: proxy
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
