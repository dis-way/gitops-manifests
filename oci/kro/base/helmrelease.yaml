apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro-system
spec:
  chart:
    spec:
      chart: kro
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: kro-system
      version: 0.8.5
  interval: 1h
  timeout: 5m
  install:
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
